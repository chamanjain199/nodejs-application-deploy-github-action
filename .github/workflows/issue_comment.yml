name: Create a comment on a new issue

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  comment-with-action:
    runs-on: ubuntu-latest

    steps:
      - name: Dump GitHub context
        run: echo '${{ toJSON(github.event) }}' | jq
        shell: bash

      - name: Create comment using action
        uses: peter-evans/create-or-update-comment@v5
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ✅ Comment from action
            - Using reusable GitHub Action

  comment-with-api:
    runs-on: ubuntu-latest
    needs: comment-with-action   # optional (ensures order)

    steps:
      - name: Create comment using GitHub API
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments \
            -d '{
              "body": "🚀 Comment created using GitHub REST API"
            }'
